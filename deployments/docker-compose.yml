services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coachlink
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: auth_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coachlink -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    environment:
      APP_PORT: "8001"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: auth_db
      DB_USER: coachlink
      DB_PASSWORD: secret
      DB_SSLMODE: disable
      NATS_URL: nats://nats:4222
      JWT_SECRET: coachlink-jwt-secret-change-in-production
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 720h
      BCRYPT_COST: "12"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    environment:
      APP_PORT: "8002"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: user_db
      DB_USER: coachlink
      DB_PASSWORD: secret
      DB_SSLMODE: disable
      NATS_URL: nats://nats:4222
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  training-service:
    build:
      context: ..
      dockerfile: services/training-service/Dockerfile
    environment:
      APP_PORT: "8003"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: training_db
      DB_USER: coachlink
      DB_PASSWORD: secret
      DB_SSLMODE: disable
      NATS_URL: nats://nats:4222
      USER_SERVICE_URL: http://user-service:8002
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  notification-service:
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    environment:
      APP_PORT: "8004"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: notification_db
      DB_USER: coachlink
      DB_PASSWORD: secret
      DB_SSLMODE: disable
      NATS_URL: nats://nats:4222
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/firebase-credentials.json
    volumes:
      - ./secrets/firebase-credentials.json:/secrets/firebase-credentials.json:ro
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  analytics-service:
    build:
      context: ..
      dockerfile: services/analytics-service/Dockerfile
    environment:
      APP_PORT: "8005"
      TRAINING_SERVICE_URL: http://training-service:8003
    ports:
      - "8005:8005"
    depends_on:
      - training-service

  ai-service:
    build:
      context: ..
      dockerfile: services/ai-service/Dockerfile
    environment:
      APP_PORT: "8006"
      ANALYTICS_SERVICE_URL: http://analytics-service:8005
      TRAINING_SERVICE_URL: http://training-service:8003
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: gemma3:4b
    ports:
      - "8006:8006"
    depends_on:
      - analytics-service

  ollama:
    build:
      context: ..
      dockerfile: services/ollama/Dockerfile
    environment:
      OLLAMA_MODEL: gemma3:4b
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    environment:
      APP_PORT: "8080"
      AUTH_SERVICE_URL: http://auth-service:8001
      USER_SERVICE_URL: http://user-service:8002
      TRAINING_SERVICE_URL: http://training-service:8003
      NOTIFICATION_SERVICE_URL: http://notification-service:8004
      ANALYTICS_SERVICE_URL: http://analytics-service:8005
      AI_SERVICE_URL: http://ai-service:8006
      JWT_SECRET: coachlink-jwt-secret-change-in-production
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - user-service
      - training-service
      - notification-service
      - analytics-service
      - ai-service

  web:
    build:
      context: ..
      dockerfile: services/web/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

  integration-test:
    build:
      context: ../tests/integration
      dockerfile: Dockerfile
    environment:
      BASE_URL: http://api-gateway:8080
    depends_on:
      - api-gateway
    profiles:
      - test

  swagger-ui:
    image: swaggerapi/swagger-ui
    environment:
      SWAGGER_JSON: /openapi.yaml
    volumes:
      - ../docs/api/openapi.yaml:/openapi.yaml:ro
    ports:
      - "8090:8080"

volumes:
  postgres_data:
  nats_data:
  ollama_data:
